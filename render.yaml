services:
  - type: web
    name: tp-laravel
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /tmp/database.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: BLOCKCHAIN_MODE
        value: simulation
      - key: NODE_BINARY
        value: node
      - key: ALLOW_DEMO_WALLET
        value: "false"
