# Render Blueprint — AutoChain Emmaus (Laravel + PostgreSQL)
# Dashboard Render > New > Blueprint > repo tp-laravel

databases:
  - name: tp-laravel-db
    plan: free
    databaseName: tp_laravel
    user: tp_laravel

services:
  - type: web
    name: tp-laravel
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tp-laravel-db
          property: connectionString
      - key: DB_CONNECTION
        value: pgsql
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: BLOCKCHAIN_MODE
        value: simulation
      - key: NODE_BINARY
        value: node
      - key: ALLOW_DEMO_WALLET
        value: "false"
      - key: APP_KEY
        generateValue: true
